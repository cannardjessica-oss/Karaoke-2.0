<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Karaoke</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a2e; --bg-card: #16213e; --bg-input: #0f3460;
      --accent: #e94560; --accent-hover: #ff6b81; --text: #eaeaea;
      --text-muted: #888; --border: #2a2a4a; --success: #2ecc71; --radius: 10px;
    }
    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      -webkit-tap-highlight-color: transparent;
    }

    /* Header */
    header {
      background: var(--bg-card); padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 10px;
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 1.2rem; text-align: center; }
    .search-row { display: flex; gap: 8px; }
    .search-row input {
      flex: 1; background: var(--bg-input); border: 1px solid var(--border);
      color: var(--text); padding: 10px 12px; border-radius: var(--radius);
      font-size: 1rem; outline: none;
    }
    .search-row input:focus { border-color: var(--accent); }
    .search-row button {
      background: var(--accent); color: #fff; border: none;
      padding: 10px 16px; border-radius: var(--radius);
      font-size: 0.95rem; cursor: pointer; white-space: nowrap;
    }

    /* Tabs */
    .tabs {
      display: flex; gap: 0; background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1; padding: 10px; text-align: center;
      background: transparent; color: var(--text-muted);
      border: none; border-bottom: 2px solid transparent;
      font-size: 0.9rem; cursor: pointer;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Content */
    main { flex: 1; overflow-y: auto; padding: 12px; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* Song list */
    .song-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px;
      margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }
    .song-num { color: var(--text-muted); font-size: 0.85rem; min-width: 24px; text-align: center; }
    .song-info { flex: 1; min-width: 0; }
    .song-title {
      font-weight: 600; font-size: 0.95rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .song-artist {
      font-size: 0.8rem; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .song-play {
      background: transparent; border: none;
      padding: 4px 8px; cursor: pointer; white-space: nowrap;
      line-height: 0; border-radius: var(--radius);
    }
    .song-play svg { display: block; pointer-events: none; }
    .song-play:hover { opacity: 0.8; }
    .song-menu {
      background: transparent; border: none; color: var(--text-muted);
      font-size: 1.3rem; padding: 4px 8px; cursor: pointer;
      line-height: 1; border-radius: 50%;
    }
    .song-menu:hover { background: rgba(255,255,255,0.08); }

    /* Song list sort header */
    .sort-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; margin-bottom: 4px; font-size: 0.8rem; color: var(--text-muted);
    }
    .sort-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-muted);
      padding: 5px 10px; border-radius: 20px; font-size: 0.75rem; cursor: pointer;
    }
    .sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Artist accordion */
    .artist-group { margin-bottom: 4px; }
    .artist-group-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
      -webkit-user-select: none; user-select: none;
    }
    .artist-group-header:active { background: rgba(233,69,96,0.08); }
    .artist-chevron {
      font-size: 0.65rem; color: var(--text-muted);
      transition: transform 0.2s; width: 12px; text-align: center;
    }
    .artist-group.open .artist-chevron { transform: rotate(90deg); }
    .artist-name { font-weight: 600; font-size: 0.95rem; flex: 1; }
    .artist-count { font-size: 0.8rem; color: var(--text-muted); }
    .artist-group-songs { display: none; padding: 4px 0 4px 24px; }
    .artist-group.open .artist-group-songs { display: block; }
    .artist-song-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-bottom: 1px solid var(--border);
    }
    .artist-song-item:last-child { border-bottom: none; }
    .artist-song-title { flex: 1; font-size: 0.9rem; }

    /* YouTube results (inline, dismissible) */
    #yt-results-section {
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      padding: 10px 12px; display: none;
    }
    #yt-results-section.show { display: block; }
    .yt-results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .yt-results-header h3 { font-size: 0.9rem; }
    .yt-close {
      background: transparent; border: none; color: var(--text-muted);
      font-size: 1.2rem; cursor: pointer; padding: 4px 8px;
    }

    /* Filter */
    #filter-input {
      width: 100%; background: var(--bg-input); border: 1px solid var(--border);
      color: var(--text); padding: 10px 12px; border-radius: var(--radius);
      font-size: 1rem; outline: none; margin-bottom: 10px;
    }
    #filter-input:focus { border-color: var(--accent); }

    /* Empty state */
    .empty { text-align: center; color: var(--text-muted); font-style: italic; padding: 32px 0; }

    /* Toast */
    #m-toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--bg-card); border: 1px solid var(--success);
      color: var(--text); padding: 10px 20px; border-radius: var(--radius);
      font-size: 0.9rem; z-index: 200; display: none;
    }

    /* Action Sheet (long-press menu) */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 100; display: none; align-items: flex-end; justify-content: center;
    }
    .overlay.show { display: flex; }
    .action-sheet {
      background: var(--bg-card); border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0; width: 100%; max-width: 500px;
      padding: 8px 0 env(safe-area-inset-bottom, 12px);
    }
    .action-sheet-title {
      padding: 14px 16px 8px; font-size: 0.8rem; color: var(--text-muted);
      text-align: center; border-bottom: 1px solid var(--border);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .action-sheet button {
      display: block; width: 100%; background: transparent; border: none;
      color: var(--text); padding: 14px 20px; text-align: left;
      font-size: 1rem; cursor: pointer;
    }
    .action-sheet button:hover { background: rgba(255,255,255,0.05); }
    .action-sheet .danger { color: var(--accent); }
    .action-sheet .cancel { text-align: center; color: var(--text-muted); border-top: 1px solid var(--border); }

    /* Edit modal */
    .edit-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 150; display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .edit-modal.show { display: flex; }
    .edit-modal-content {
      background: var(--bg-card); border-radius: 12px; padding: 20px;
      width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px;
    }
    .edit-modal-content h3 { font-size: 1rem; text-align: center; }
    .edit-modal-content label {
      display: flex; flex-direction: column; gap: 4px; font-size: 0.85rem; color: var(--text-muted);
    }
    .edit-modal-content input {
      background: var(--bg-input); border: 1px solid var(--border);
      color: var(--text); padding: 10px 12px; border-radius: var(--radius);
      font-size: 1rem; outline: none;
    }
    .edit-modal-content input:focus { border-color: var(--accent); }
    .edit-modal-actions { display: flex; gap: 8px; }
    .edit-modal-actions button {
      flex: 1; padding: 10px; border: none; border-radius: var(--radius);
      font-size: 0.95rem; cursor: pointer; color: #fff;
    }
    .edit-save { background: var(--accent); }
    .edit-cancel { background: var(--border); }
  </style>
</head>
<body>

  <header>
    <h1>🎤 Karaoke</h1>
    <div class="search-row">
      <input type="text" id="yt-search" placeholder="Search YouTube…" autocomplete="off" />
      <button id="yt-search-btn">Search</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="all-songs">All Songs</button>
    <button class="tab" data-tab="by-artist">By Artist</button>
  </div>

  <!-- YouTube results (inline, above song list) -->
  <div id="yt-results-section">
    <div class="yt-results-header">
      <h3>YouTube Results</h3>
      <button class="yt-close" id="yt-close-btn">✕</button>
    </div>
    <div id="yt-results"></div>
  </div>

  <main>
    <!-- All Songs panel -->
    <div id="all-songs-panel" class="panel active">
      <input type="text" id="filter-input" placeholder="Search songs…" />
      <div class="sort-header">
        Sort: <button class="sort-btn active" data-sort="date">Date Added</button>
        <button class="sort-btn" data-sort="title">Title A-Z</button>
        <button class="sort-btn" data-sort="artist">Artist A-Z</button>
      </div>
      <div id="songs-list"></div>
    </div>

    <!-- By Artist panel -->
    <div id="by-artist-panel" class="panel">
      <input type="text" id="artist-filter-input" placeholder="Search songs…" style="width:100%;background:var(--bg-input);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--radius);font-size:1rem;outline:none;margin-bottom:10px;" />
      <div id="artist-list"></div>
    </div>
  </main>

  <div id="m-toast"></div>

  <!-- Action Sheet (long-press menu) -->
  <div id="action-overlay" class="overlay">
    <div class="action-sheet">
      <div id="action-title" class="action-sheet-title"></div>
      <button id="action-edit">✏️ Edit</button>
      <button id="action-swap">⇄ Swap Title & Artist</button>
      <button id="action-delete" class="danger">🗑️ Delete</button>
      <button id="action-cancel" class="cancel">Cancel</button>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="edit-modal">
    <div class="edit-modal-content">
      <h3>Edit Song</h3>
      <label>Title <input type="text" id="edit-title" /></label>
      <label>Artist <input type="text" id="edit-artist" /></label>
      <div class="edit-modal-actions">
        <button class="edit-cancel" id="edit-cancel-btn">Cancel</button>
        <button class="edit-save" id="edit-save-btn">Save</button>
      </div>
    </div>
  </div>

<script>
const API = "";  // same origin

// ── Helpers ───────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("m-toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2500);
}

function decodeHTML(html) {
  const txt = document.createElement("textarea");
  txt.innerHTML = html;
  return txt.value;
}

// ── Tabs ──────────────────────────────────────────────
let activeTab = "all-songs";

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    activeTab = tab.dataset.tab;
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.getElementById(activeTab + "-panel").classList.add("active");
    refreshView();
  });
});

// ── Songs ─────────────────────────────────────────────
let allSongs = [];
let currentSort = "date";

async function loadSongs() {
  const res = await fetch(API + "/api/songs");
  allSongs = await res.json();
  refreshView();
}

function refreshView() {
  const filterVal = activeTab === "all-songs"
    ? document.getElementById("filter-input").value.toLowerCase()
    : document.getElementById("artist-filter-input").value.toLowerCase();
  let songs = allSongs;
  if (filterVal) {
    songs = allSongs.filter(s =>
      s.title.toLowerCase().includes(filterVal) || s.artist.toLowerCase().includes(filterVal)
    );
  }
  if (activeTab === "all-songs") {
    renderSongs(songs);
  } else {
    renderByArtist(songs);
  }
}

function sortSongs(songs) {
  if (currentSort === "date") return songs;
  const sorted = [...songs].sort((a, b) => {
    const aVal = (a[currentSort] || "").toLowerCase();
    const bVal = (b[currentSort] || "").toLowerCase();
    return aVal.localeCompare(bVal);
  });
  return sorted;
}

function renderSongs(songs) {
  const sorted = sortSongs(songs);
  const list = document.getElementById("songs-list");
  if (!sorted.length) {
    list.innerHTML = '<p class="empty">No songs yet</p>';
    return;
  }
  list.innerHTML = sorted.map((s, i) => `
    <div class="song-item" data-song-id="${s.id}" data-title="${encodeURIComponent(s.title)}" data-artist="${encodeURIComponent(s.artist)}">
      <span class="song-num">${i + 1}</span>
      <div class="song-info">
        <div class="song-title">${decodeHTML(s.title)}</div>
        <div class="song-artist">${decodeHTML(s.artist)}</div>
      </div>
      <button class="song-play" data-id="${s.youtube_id}"><svg width="24" height="18" viewBox="0 0 68 48"><rect rx="10" ry="10" width="68" height="48" fill="#f00"/><polygon points="27,14 27,34 46,24" fill="#fff"/></svg></button>
      <button class="song-menu">⋮</button>
    </div>
  `).join("");
}

function renderByArtist(songs) {
  const list = document.getElementById("artist-list");
  if (!songs.length) {
    list.innerHTML = '<p class="empty">No songs yet</p>';
    return;
  }
  const groups = {};
  songs.forEach(s => {
    const key = (s.artist || "Unknown").trim().toLowerCase();
    if (!groups[key]) groups[key] = { display: s.artist || "Unknown", songs: [] };
    groups[key].songs.push(s);
  });
  const sortedKeys = Object.keys(groups).sort((a, b) => a.localeCompare(b));
  list.innerHTML = sortedKeys.map(key => {
    const g = groups[key];
    g.songs.sort((a, b) => (a.title || "").toLowerCase().localeCompare((b.title || "").toLowerCase()));
    return `
      <div class="artist-group">
        <div class="artist-group-header">
          <span class="artist-chevron">▶</span>
          <span class="artist-name">${decodeHTML(g.display)}</span>
          <span class="artist-count">${g.songs.length} song${g.songs.length !== 1 ? "s" : ""}</span>
        </div>
        <div class="artist-group-songs">
          ${g.songs.map(s => `
            <div class="artist-song-item" data-song-id="${s.id}" data-title="${encodeURIComponent(s.title)}" data-artist="${encodeURIComponent(s.artist)}">
              <span class="artist-song-title">${decodeHTML(s.title)}</span>
              <button class="song-play" data-id="${s.youtube_id}"><svg width="24" height="18" viewBox="0 0 68 48"><rect rx="10" ry="10" width="68" height="48" fill="#f00"/><polygon points="27,14 27,34 46,24" fill="#fff"/></svg></button>
              <button class="song-menu">⋮</button>
            </div>
          `).join("")}
        </div>
      </div>`;
  }).join("");
}

// ── Artist accordion toggle ───────────────────────────
document.getElementById("artist-list").addEventListener("click", (e) => {
  const header = e.target.closest(".artist-group-header");
  if (header) {
    header.parentElement.classList.toggle("open");
  }
});

// ── Sort buttons ──────────────────────────────────────
document.querySelectorAll(".sort-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentSort = btn.dataset.sort;
    refreshView();
  });
});

// ── Filter inputs ─────────────────────────────────────
document.getElementById("filter-input").addEventListener("input", () => refreshView());
document.getElementById("artist-filter-input").addEventListener("input", () => refreshView());

// ── Menu button opens action sheet ────────────────────
let lpSongId = null;
let lpSongTitle = "";
let lpSongArtist = "";

const overlay = document.getElementById("action-overlay");

document.addEventListener("click", (e) => {
  const menuBtn = e.target.closest(".song-menu");
  if (!menuBtn) return;
  const item = menuBtn.closest("[data-song-id]");
  if (!item) return;
  lpSongId = Number(item.dataset.songId);
  lpSongTitle = decodeURIComponent(item.dataset.title);
  lpSongArtist = decodeURIComponent(item.dataset.artist);
  document.getElementById("action-title").textContent = lpSongArtist + " – " + lpSongTitle;
  overlay.classList.add("show");
});

// Close action sheet
document.getElementById("action-cancel").addEventListener("click", () => overlay.classList.remove("show"));
overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.classList.remove("show"); });

// ── Play button (both panels) ─────────────────────────
document.addEventListener("click", (e) => {
  const btn = e.target.closest(".song-play");
  if (!btn) return;
  e.stopPropagation();
  fetch("/api/play", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ youtubeId: btn.dataset.id })
  }).then(r => {
    if (!r.ok) showToast("Failed to play");
  }).catch(() => showToast("Failed to play"));
  showToast("Playing on desktop...");
});

// ── Swap ──────────────────────────────────────────────
document.getElementById("action-swap").addEventListener("click", async () => {
  overlay.classList.remove("show");
  if (!lpSongId) return;
  try {
    await fetch(API + "/api/songs/" + lpSongId, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title: lpSongArtist, artist: lpSongTitle })
    });
    showToast("Swapped!");
    loadSongs();
  } catch { showToast("Failed to swap"); }
});

// ── Delete ────────────────────────────────────────────
document.getElementById("action-delete").addEventListener("click", async () => {
  overlay.classList.remove("show");
  if (!lpSongId) return;
  try {
    await fetch(API + "/api/songs/" + lpSongId, { method: "DELETE" });
    showToast("Deleted");
    loadSongs();
  } catch { showToast("Failed to delete"); }
});

// ── Edit ──────────────────────────────────────────────
const editModal = document.getElementById("edit-modal");
const editTitleInput = document.getElementById("edit-title");
const editArtistInput = document.getElementById("edit-artist");

document.getElementById("action-edit").addEventListener("click", () => {
  overlay.classList.remove("show");
  editTitleInput.value = lpSongTitle;
  editArtistInput.value = lpSongArtist;
  editModal.classList.add("show");
});

document.getElementById("edit-cancel-btn").addEventListener("click", () => editModal.classList.remove("show"));

document.getElementById("edit-save-btn").addEventListener("click", async () => {
  const title = editTitleInput.value.trim();
  const artist = editArtistInput.value.trim();
  if (!title || !artist) { showToast("Fields cannot be empty"); return; }
  try {
    await fetch(API + "/api/songs/" + lpSongId, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, artist })
    });
    showToast("Saved!");
    editModal.classList.remove("show");
    loadSongs();
  } catch { showToast("Failed to save"); }
});

// ── YouTube Search ────────────────────────────────────
const ytSearchInput = document.getElementById("yt-search");
const ytSearchBtn = document.getElementById("yt-search-btn");
const ytResultsSection = document.getElementById("yt-results-section");

document.getElementById("yt-close-btn").addEventListener("click", () => {
  ytResultsSection.classList.remove("show");
});

async function doSearch() {
  const q = ytSearchInput.value.trim();
  if (!q) return;
  ytSearchBtn.disabled = true;
  ytSearchBtn.textContent = "…";
  try {
    const res = await fetch(API + "/api/youtube/search?q=" + encodeURIComponent(q));
    const results = await res.json();
    renderYTResults(results);
    ytResultsSection.classList.add("show");
  } catch (err) {
    showToast("Search failed: " + err.message);
  } finally {
    ytSearchBtn.disabled = false;
    ytSearchBtn.textContent = "Search";
  }
}

ytSearchBtn.addEventListener("click", doSearch);
ytSearchInput.addEventListener("keydown", (e) => { if (e.key === "Enter") doSearch(); });

function renderYTResults(results) {
  const container = document.getElementById("yt-results");
  if (!results.length) {
    container.innerHTML = '<p class="empty">No results found</p>';
    return;
  }
  container.innerHTML = results.map(r => `
    <div class="song-item">
      <div class="song-info">
        <div class="song-title">${decodeHTML(r.title)}</div>
        <div class="song-artist">${decodeHTML(r.channelTitle)}</div>
      </div>
      <button class="song-play" data-id="${r.videoId}" style="opacity:0.5"><svg width="24" height="18" viewBox="0 0 68 48"><rect rx="10" ry="10" width="68" height="48" fill="#f00"/><polygon points="27,14 27,34 46,24" fill="#fff"/></svg></button>
      <button class="btn-yt-add" data-id="${r.videoId}" data-title="${encodeURIComponent(r.title)}" data-channel="${encodeURIComponent(r.channelTitle)}" style="background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:var(--radius);font-size:0.8rem;cursor:pointer;">+ Add</button>
    </div>
  `).join("");
}

document.getElementById("yt-results").addEventListener("click", async (e) => {
  const btn = e.target.closest("button");
  if (!btn) return;

  if (btn.classList.contains("btn-yt-add")) {
    const rawTitle = decodeURIComponent(btn.dataset.title);
    const parsed = parseVideoTitle(rawTitle);
    try {
      const res = await fetch(API + "/api/songs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title: parsed.title,
          artist: parsed.artist,
          youtubeId: btn.dataset.id
        })
      });
      const result = await res.json();
      if (result.success) {
        showToast("Added!");
        btn.textContent = "✓ Added";
        btn.disabled = true;
        loadSongs();
      } else {
        showToast(result.error || "Already exists");
      }
    } catch (err) {
      showToast("Failed to add");
    }
  }
});

// ── Title parser (same logic as desktop) ──────────────
function parseVideoTitle(rawTitle) {
  let title = rawTitle;
  title = title.replace(/\s*[\(\[][^\)\]]*[\)\]]/g, "");
  title = title.replace(/\s*\|{1,}\s*/g, " | ");
  title = title.replace(/\s+[-–—]\s+/g, " - ");

  const segments = title.split(/\s+[-–—|]\s+/);
  const fluff = /^(karaoke|instrumental|lyrics?|official|video|hd|hq|audio|version|with\s+lyrics?|sing\s+along|backing\s+track|karafun|minus\s+one)$/i;

  const clean = segments
    .map(s => s.trim())
    .filter(s => s && !fluff.test(s));

  if (clean.length >= 2) {
    return { artist: clean[0], title: clean.slice(1).join(" - ") };
  }
  if (clean.length === 1) {
    return { artist: "Unknown", title: clean[0] };
  }
  return { artist: "Unknown", title: rawTitle.trim() };
}
